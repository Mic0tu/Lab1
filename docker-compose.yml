services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: notebook
      POSTGRES_PASSWORD: notebook
      POSTGRES_DB: notebook
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./app/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notebook -d notebook"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: ./app
    environment:
      APP_ADDR: ":8080"
      DATABASE_URL: postgres://notebook:notebook@db:5432/notebook?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

volumes:
  db_data:
